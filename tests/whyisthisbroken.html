<script>
    //------------------------------------- IMAGE ROTATION-----------------------------------------
    const currentMonth = new Date().getMonth();
	  
    const monthlyContent = [
        { title: "January", imgPool: [{ file: "spooky.png", position: "65%" }, { file: "spooky.png", position: "95%" }] },
        { title: "February", imgPool: [{ file: "spooky.png", position: "65%" }, { file: "spooky.png", position: "95%" }] },
        { title: "March", imgPool: [{ file: "spooky.png", position: "65%" }, { file: "spooky.png", position: "95%" }] },
        { title: "April", imgPool: [{ file: "spooky.png", position: "65%" }, { file: "spooky.png", position: "95%" }] },
        { title: "Epsilon", imgPool: [{ file: "spooky.png", position: "65%" }, { file: "spooky.png", position: "95%" }] },
        { title: "Lambda", imgPool: [{ file: "spooky.png", position: "65%" }, { file: "spooky.png", position: "95%" }] },
        { title: "July", imgPool: [{ file: "spooky.png", position: "65%" }, { file: "spooky.png", position: "95%" }] },
        { title: "August", imgPool: [{ file: "spooky.png", position: "65%" }, { file: "spooky.png", position: "95%" }] },
        { title: "September", imgPool: [{ file: "spooky.png", position: "65%" }, { file: "spooky.png", position: "95%" }] },
        { title: "October", imgPool: [{ file: "spooky.png", position: "65%" }, { file: "spooky.png", position: "95%" }] },
        { title: "November", imgPool: [{ file: "spooky.png", position: "65%" }, { file: "spooky.png", position: "95%" }] },
        { title: "December", imgPool: [{ file: "spooky.png", position: "65%" }, { file: "spooky.png", position: "95%" }] }
    ];
 
    const currentData = monthlyContent[currentMonth];
    const randomIndex = Math.floor(Math.random() * currentData.imgPool.length);
    const chosenImage = currentData.imgPool[randomIndex];

    // This target ID now accurately maps to the HTML document structure above
    document.getElementById('example').innerHTML = `
        <div class="card">
            <h1>${currentData.title}</h1>
            <!-- Added image rendering to actually use your random image selector logic -->
            <img src="${chosenImage.file}" style="object-position: center ${chosenImage.position}; max-width:100%; height:auto;" alt="${currentData.title} theme image">
        </div> 
    `;
</script>
