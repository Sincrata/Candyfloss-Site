<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="stylesheet" href="GeneralCSS.css">
	<link rel="preload" href="logos/logo.gif" as="image">
	<script src="components/header-component.js"></script>
	<script src="components/footer-component.js"></script>
	<script src="components/navbar-component.js"></script>
	<link rel="icon" href="icons/Planet.ico">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Gacha Stock</title>
    	<style>

		#entry-grid{
    			display: grid;
    			grid-template-columns: repeat(auto-fill, 280px);
    			gap: 1rem;
    			justify-content: center;
		}


		.entry{ 
			background-color: #403175;
			border-radius:5px;
			box-shadow: 5px 5px 5px 5px #140c38;
			padding: 1em; 
			margin: 1rem;
			display: flex; 
			flex-direction: column; 
			justify-content: center; 
			align-items: center;
		}
		.loading {
			background-color:#403175;
			border-radius:5px;
			box-shadow: 5px 5px 5px 5px #140c38;
    			width: 100%;
    			padding: 1.5rem;
    			text-align: center;
    			box-sizing: border-box;
		}
		.entry-image{
    			max-width:100%;
				width: auto;
    			height: auto;
				max-height:300px;
    			display: block;
    			border-radius: 6px;
		}

		.entry-title, .loading h4{
    			margin: 0.5rem 0;
    			font-size: 1.2rem;
			text-align: center;
		}

		.entry-info p{
    			margin: 0;
    			font-size: 0.9rem;
			text-align: center;
		}
    	</style>
</head>
<body>
	<header loading="eager">
		<main-header></main-header>
	</header>
	<main><a href="#" class="back-to-top" aria-label="Scroll to top">
  <img src="icons/uparrow.png" alt="Back to top" />
</a>
		<nav-bar></nav-bar>
		<center>
			<img src="Banners/gachas.png" style="max-width:70%;margin-bottom:-15px; margin-top:25px;border-radius: 5px 5px 0 0 ;box-shadow:5px -7px 5px 5px #140c38;">
			<div class= "card" style="padding-top:5px;width:70%;;margin-top:0px;margin-bottom:30px;padding:0px;box-sizing:border-box;border-radius:  0px 0px 5px 5px ;">
				<br><br><a class="shrink" href="GachaponMachine.html"><img src="images/gachamachine2.png" style="max-width:20%;float:right;"></a>
				<span><div class="inner-card" style="max-width:75%;"><h1>Gacha Stock</h1>
					Check out these awesome Candyfloss who are currently stocked in the Gachapon~<br>See a favorite that you'd like to win?<br><img src="icons/coin.gif" style="max-height:35px;"><br>Spend Floss coins at the Gacha Machine for a chance to win them! <br>Good Luck!
				</span>
				<br><br></div></div>
				<br>
				 &nbsp;

			</div>

			<article id="entries">
				<div id="entry-body">
					<div id="entry-loading" class="loading"><h4>Loading Entries</h4></div>
					<div id="entry-grid">
					</div>
				</div>
			</article>
		</center>
	</main> 
	<footer>
		<main-footer></main-footer>
	</footer>
	<script>
		document.getElementById("nav-toggle").addEventListener("click", () => {
    			document.getElementById("nav-wrapper").classList.toggle("open");
		});

		document.querySelectorAll(".dropdown > a").forEach(link => {
    		link.addEventListener("click", (e) => {
        			if (window.innerWidth > 700) return;

        			e.preventDefault();
        			const dropdown = link.nextElementSibling;
        			dropdown.classList.toggle("open");
    			});
		});
		async function main() {
			const params = new URLSearchParams(window.location.search);
			var achievement = params.get("achievement") ?? "";

			async function fetchCSV(url) {
    				const res = await fetch(url);
    				const text = await res.text();
    				return text;
			}

			function parseCSV(text) {
    				return text
        			.trim()
        			.split(/\r?\n/)
        			.map(line =>
            				line
                		.split(",")
                		.map(cell => cell.replace(/^"|"$/g, "")) 
        			);
			}

			function filterRows(rows, colAName, colAValue, colBName, colBValue) {
    				const header = rows[0];
    				const data = rows.slice(1);

    				const colAIndex = header.indexOf(colAName);
    				const colBIndex = header.indexOf(colBName);

    				if (colAIndex === -1 || colBIndex === -1) {
        			console.error("Column name not found in header:", { header, colAName, colBName });
        			return [];
    				}

    				const maxIndex = Math.max(colAIndex, colBIndex);

    				return data.filter(row => {
        				if (!row || row.length <= maxIndex) {
            				// too short to safely read both columns → ignore
            				return false;
        				}

        				const a = row[colAIndex];
        				const b = row[colBIndex];

        				if (a == null || b == null) {
            					return false;
        				}

        				return a.toLowerCase() === colAValue.toLowerCase();
    				});
			}

			async function loadFilteredEntryData() {
    				const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTw3S46YYItCsz-DeaZN1uv9hAcoDG8RyVHyATRpYpJsWFM7H9shhrQfEdaDxxCWJF5Wskbx09JSdfH/pub?gid=1710236732&single=true&output=csv";

    				const csv = await fetchCSV(url);
    				const rows = parseCSV(csv);

    				const results = filterRows(
        				rows,
        				"Available",  "Yes",
						"Available",  "Yes"
					);

    				console.log(results);
				return results;
			}

			const entries = await loadFilteredEntryData();

			var html = "";
			const entrygrid = document.getElementById("entry-grid");

			for (let i = 0; i < entries.length; i++) { 
				const entry = entries[i];
				html +=`<div class="entry"> 	
				`;
				if(entry[4] == "Yes"){
					html += `<a class="shrink" href="${entry[2]}"><img class="entry-image" src="${entry[1]}"></a>`;
				}else{
					html += `error`;
				}
				html +=`
				 
				</div>
				`;
			}

			if(html == ""){
				html = `<div class="loading" style="width: 100%;"> <h4 class="entry-title">No Entries Yet</h4></div>`;
				entrygrid.style.gridTemplateColumns = "repeat(auto-fit, minmax(250px, 1fr))";
			}

			var eloading = document.getElementById("entry-loading");
			eloading.style.display = "none";

			entrygrid.innerHTML = html;

			

		}
		main();
	</script>
</body>
</html>
