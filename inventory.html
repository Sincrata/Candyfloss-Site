<!DOCTYPE html>
<html lang="en">
<head>
 	 <meta charset="UTF-8" />
  	<title>My Inventory</title>
	<link rel="stylesheet" href="GeneralCSS.css">
	<link rel="preload" href="logos/logo.gif" as="image">
	<script src="components/header-component.js"></script>
	<script src="components/footer-component.js"></script>
	<script src="components/navbar-component.js"></script>
  	<link rel="icon" href="icons/Planet.ico">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
	#myo-grid, #trait-grid, #voucher-grid, #event-grid, #petpet-grid{
    		display: grid;
    		grid-template-columns: repeat(auto-fill, 280px);
    		gap: 1rem;
    		justify-content: center;
	}


	.myo, .trait, .voucher, .event, .petpet{ 
		background-color: #403175;
		border-radius:5px;
		box-shadow: 5px 5px 5px 5px #140c38;
		padding: 1em; 
		margin: 1rem;
		display: flex; 
		flex-direction: column; 
		justify-content: center; 
		align-items: center;
	}
	.loading {
		background-color:#403175;
		border-radius:5px;
		box-shadow: 5px 5px 5px 5px #140c38;
    		width: 100%;
    		padding: 1.5rem;
    		text-align: center;
    		box-sizing: border-box;
	}
	.title-card{
		background-color:#403175;
		border-radius:5px;
		box-shadow: 5px 5px 5px 5px #140c38;
    		width: 100%;
    		padding: 1.5rem;
		box-sizing: border-box;
	}
	.title-card .title-row{
		display: flex;
		flex-direction: row;
		align-items: center;
		justify-content: space-between;
	}


	.myo-image, .trait-image, .voucher-image, .event-image, .petpet-image{
    		width: 100%;
    		height: auto;
    		display: block;
    		border-radius: 6px;
	}

	.myo-title, .trait-title, .voucher-title, .event-title, .petpet-title, .loading h4{
    		margin: 0.5rem 0;
    		font-size: 1.2rem;
		text-align: center;
	}

	.myo-info p, .trait-info p, .voucher-info p, .event-info p, .petpet-info p{
    		margin: 0;
    		font-size: 0.9rem;
		text-align: center;
	}
	.collapsible {
    		cursor: pointer;
    		display: flex;
    		align-items: center;
    		gap: 0.5rem;
		margin-left: 25px;
		
	}
	.arrow {
    		transition: transform 0.2s ease;
	}
	.collapsed .arrow {
    		transform: rotate(-90deg);
	}
	.collapsible-content {
    		display: block;
	}
	.collapsed + .collapsible-content {
    		display: none;
	}
	#inventory{
		margin: 0px 25px;
		box-sizing: border-box;
	}
	#disclaimer{
		margin: 0px 25px;
	}
	main{
		min-height: 65vh;
	}
	#onto-inventory{
		max-width: 90%;
		display: flex;
		justify-items: center;
		margin: auto;
		margin-top: 15px;
		text-align: center;
		min-height: 35vh;
	}
		.input {
    			width: 25%;
    			padding: 6px 16px;
    			border: 2px solid #d9c5ff;
    			border-radius: 8px;
    			background: #f7f2ff;
    			color: #471c81;
    			font-size: 1rem;
    			transition: border-color 0.2s ease, box-shadow 0.2s ease;
			margin-bottom: 15px;
			margin-top: 15px;
		}

		.input:focus {
    			border-color: #8c6cff;
    			box-shadow: 0 0 6px rgba(140, 108, 255, 0.5);
    			outline: none;
		}
		

  </style>
</head>
<body>
	<header id="header">
		<main-header></main-header>
	</header>
	<main>
		<nav-bar></nav-bar>
		<div id="onto-inventory" class="card" style="display: none;">
			<img src="logos/inventory.png" alt="Inventory" style="display:inline-block; max-width: 100%;">
			<br>
			<span> Enter your username below to check out what goodies you have access to! </span>
			<br>
			<input class="input" id="username" type="text" placeholder="Enter Username..." style=""></input>
			<br>
			<button id="inventory-button" class="button" style="width: 75%; margin: auto;" disabled>Go To Inventory</button>
		</div>
		<div id="inventory">
			<div class="title-card" style="margin-top: 15px;">
				<div class="title-row">
					<h1 id="title"> X's Inventory</h1>
					<div style="display: flex;flex-direction: row;align-items: center;">
						<img src="icons/coin.gif" style="height:30px; display: inline-block;">
						<h1 id="coin-count">Loading Coins</h1>
					</div>
				</div>
				<hr>
			</div>

			<article id="event">
				<div id="event-header" class="collapsible"><span class="arrow">▼</span><h2>Ascension</h2></div>
				<div id="event-body" class="collapsible-content">
					<div id="event-loading" class="loading"><h4>Loading Event</h4></div>
					<div id="event-grid">
					</div>
				</div>
			</article>


			<article id="myos">
				<div id="myo-header" class="collapsible"><span class="arrow">▼</span><h2>MYOs</h2></div>
				<div id="myo-body" class="collapsible-content">
					<div id="myo-loading" class="loading"><h4>Loading Myos</h4></div>
					<div id="myo-grid">
					</div>
				</div>
			</article>


			<article id="traits">
				<div id="traits-header" class="collapsible"><span class="arrow">▼</span><h2>Traits & Packs</h2></div>
				<div id="traits-body" class="collapsible-content">
					<div id="trait-loading" class="loading"><h4>Loading Traits</h4></div>
					<div id="trait-grid">
					</div>
				</div>
			</article>

			<article id="vouchers">
				<div id="vouchers-header" class="collapsible"><span class="arrow">▼</span><h2>Redesign Vouchers: $0</h2></div>
				<div id="vouchers-body" class="collapsible-content">
					<div id="voucher-loading" class="loading"><h4>Loading Vouchers</h4></div>
					<div id="voucher-grid">
					</div>
				</div>
			</article>

			<article id="petpets">
				<div id="petpet-header" class="collapsible"><span class="arrow">▼</span><h2>Petpet MYOs</h2></div>
				<div id="petpet-body" class="collapsible-content">
					<div id="petpet-loading" class="loading"><h4>Loading Petpet MYOs</h4></div>
					<div id="petpet-grid">
					</div>
				</div>
			</article>
		</div>
	
	</main>
	<footer>
		<main-footer></main-footer>
	</footer>
	<script>

		document.getElementById("nav-toggle").addEventListener("click", () => {
    			document.getElementById("nav-wrapper").classList.toggle("open");
		});

		document.querySelectorAll(".dropdown > a").forEach(link => {
    		link.addEventListener("click", (e) => {
        			if (window.innerWidth > 700) return;

        			e.preventDefault();
        			const dropdown = link.nextElementSibling;
        			dropdown.classList.toggle("open");
    			});
		});
	async function main() {
		const params = new URLSearchParams(window.location.search);
		var username = params.get("username") ?? "";

		if(username ==""){
			const button = document.getElementById("onto-inventory");
			const inventory = document.getElementById("inventory");
			button.style.display = "block";
			inventory.style.display = "none";


			const invbtn = document.getElementById("inventory-button");
			username = document.getElementById("username");

			var userinput = username.value;

			username.addEventListener("keyup", () => {
				if(username.value.length > 0){
					invbtn.disabled = false;
				}else{
					invbtn.disabled = true;
				}
				userinput = username.value;
			});

			invbtn.addEventListener("click", () => {
    				const encoded = encodeURIComponent(userinput);
				window.location.href = `inventory.html?username=${encoded}`;
			});
		}
		
		document.querySelectorAll(".collapsible").forEach(header => {
    			header.addEventListener("click", () => {
        			header.classList.toggle("collapsed");
    			});
		});



		function capitalizeFirstWord(str) {
    			if (!str) return "";
    			const [first, ...rest] = str.trim().split(/\s+/);
    			return first.charAt(0).toUpperCase() + first.slice(1).toLowerCase() + 
           			(rest.length ? " " + rest.join(" ") : "");
		}
		
		username = capitalizeFirstWord(username);

		
		const title = document.getElementById("title");
		title.innerHTML = `${username}'s Inventory`;


		async function fetchCSV(url) {
    			const res = await fetch(url);
    			const text = await res.text();
    			return text;
		}

		function parseCSV(text) {
    			return text
        		.trim()
        		.split(/\r?\n/)
        		.map(line =>
            			line
                	.split(",")
                	.map(cell => cell.replace(/^"|"$/g, "")) // strip surrounding quotes
        		);
		}

		function filterRows(rows, colAName, colAValue, colBName, colBValue) {
    			const header = rows[0];
    			const data = rows.slice(1);

    			const colAIndex = header.indexOf(colAName);
    			const colBIndex = header.indexOf(colBName);

    			if (colAIndex === -1 || colBIndex === -1) {
        		console.error("Column name not found in header:", { header, colAName, colBName });
        		return [];
    			}

    			const maxIndex = Math.max(colAIndex, colBIndex);

    			return data.filter(row => {
        			if (!row || row.length <= maxIndex) {
            			// too short to safely read both columns → ignore
            			return false;
        			}

        			const a = row[colAIndex];
        			const b = row[colBIndex];

        			if (a == null || b == null) {
            				return false;
        			}

        			return a.toLowerCase() === colAValue.toLowerCase() &&
               			b.toLowerCase() === colBValue.toLowerCase();
    			});
		}

	
		function filterRows2(rows, colAName, colAValue, colBName, colBValue) {
    			const header = rows[0];
    			const data = rows.slice(1);

    			const colAIndex = header.indexOf(colAName);
    			const colBIndex = header.indexOf(colBName);

    			if (colAIndex === -1 || colBIndex === -1) {
        		console.error("Column name not found in header:", { header, colAName, colBName });
        		return [];
    			}

    			const maxIndex = Math.max(colAIndex, colBIndex);

    			return data.filter(row => {
        			if (!row || row.length <= maxIndex) {
            			// too short to safely read both columns → ignore
            			return false;
        		}

        		const a = row[colAIndex];
        		const b = row[colBIndex];

        		if (a == null || b == null) {
            			return false;
        		}

        		return a.toLowerCase() === colAValue.toLowerCase() &&
               		b.toLowerCase() !== colBValue.toLowerCase();
    			});
		}

		function filterRows3(rows, colAName, colAValue) {
    			const header = rows[0];
    			const data = rows.slice(1);

    			const colAIndex = header.indexOf(colAName);
    			if (colAIndex === -1) return [];

    			return data.filter(row => {
        			if (!row || row.length <= colAIndex) return false;
        			const a = row[colAIndex];
        			return a != null && a.toLowerCase() === colAValue.toLowerCase();
    			});
		}

		async function loadFilteredCoinData() {
    			const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTw3S46YYItCsz-DeaZN1uv9hAcoDG8RyVHyATRpYpJsWFM7H9shhrQfEdaDxxCWJF5Wskbx09JSdfH/pub?gid=913397617&single=true&output=csv";

    			const csv = await fetchCSV(url);
    			const rows = parseCSV(csv);

    			const results = filterRows3(
        			rows,
        			"Username",  username
    			);

    			console.log(results);
			return results;
		}

		async function loadFilteredEventData() {
    			const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTFYX5ZwxiLNERSnxX7W_ttlM1KGc_Lr7P8ZhpOHE5XNWDEi_qEk49HEyBm4n-00WpzKO_lng-M2x-V/pub?gid=1030020312&single=true&output=csv";

    			const csv = await fetchCSV(url);
    			const rows = parseCSV(csv);

    			const results = filterRows2(
        			rows,
        			"Username",  username,
				"Used",  "used"
    			);

    			console.log(results);
			return results;
		}
		

		
		const count = document.getElementById("coin-count");
		const coin = await loadFilteredCoinData();
		var coins = 0;
		console.log(coin.length);
		if (coin.length > 0){
			coins = coin[0][12];
		}
		count.innerHTML = `${coins} Coins`;



		
		const events = await loadFilteredEventData();
		
		var htmlev = "";
		const eventgrid = document.getElementById("event-grid");
		
		for (let i = 0; i < events.length; i++) { 
			const event = events[i]
			if (event[5] == "pending fixes") { 
				htmlev += `<div class="event"> 
				<img class="event-image" src="${event[3]}">
				<h4 class="event-title">#${event[0]} ${capitalizeFirstWord(event[4])}</h4>
				<div class="event-info">
					<p>Used: <a style="color: white;"href="${event[6]}">Pending</a></p>
					<p>Expires: 6/1/26</p>
				</div>
				</div>
				`;
			}else{
				htmlev += `<div class="event"> 
				<img class="event-image" src="${event[3]}">
				<h4 class="event-title">#${event[0]} ${capitalizeFirstWord(event[4])}</h4>
				<div class="event-info">
					<p>Used: Unused</p>`;
				

				if(event[4].includes("Event")){
					htmlev += "<p>Expires: 6/1/26</p>"
				}else{
					htmlev += "<p>Expires: 5/1/26</p>"
				}

				htmlev += `</div>
				</div>

				`;
			}
		}
		
		if(htmlev == ""){
			htmlev = `<div class="loading" style="width: 100%;"> <h4 class="event-title">No Unused Ascension Vouchers Found</h4></div>`;
			eventgrid.style.gridTemplateColumns = "repeat(auto-fit, minmax(250px, 1fr))";
		}

		var eloading = document.getElementById("event-loading");
		eloading.style.display = "none";

		eventgrid.innerHTML = htmlev;

		async function loadFilteredMYOData() {
    			const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRclpELOsw7e_9hsNHgafNBOtAwe76GOxPDX5rvX243m7Q6W8hqOTsw7k8kIEvOZKJSQTVOsuXmwCyK/pub?gid=1756069810&single=true&output=csv";

    			const csv = await fetchCSV(url);
    			const rows = parseCSV(csv);

    			const results = filterRows(
        			rows,
        			"Username",  username,
        			"Used", "unused"
    			);

    			console.log(results);
			return results;
		}

		const myos = await loadFilteredMYOData();

		var html = "";

		for (let i = 0; i < myos.length; i++) { 
			const myo = myos[i]
			if (myo[4].toLowerCase().includes("admin") || myo[4].toLowerCase().includes("contributor")) { 
				html += `<div class="myo"> 
				<img class="myo-image" src="${myo[3]}">
				<h4 class="myo-title">${capitalizeFirstWord(myo[4])} #${myo[2]}</h4>
				<div class="myo-info">
					<p>From: ${myo[5]}</p>
					<p>Date: ${myo[6]}</p>
				</div>
				</div>
			
				`;
			}else{
				html += `<div class="myo"> 
				<img class="myo-image" src="${myo[3]}">
				<h4 class="myo-title">${capitalizeFirstWord(myo[4])}</h4>
				<div class="myo-info">
					<p>From: ${myo[5]} #${myo[2]}</p>
					<p>Date: ${myo[6]}</p>
				</div>
				</div>
			
				`;
			}
		}

		
		const myogrid = document.getElementById("myo-grid");
		if(html == ""){
			html = `<div class="loading" style="width: 100%;"> <h4 class="myo-title">No Unused MYOs Found</h4></div>`;
			myogrid.style.gridTemplateColumns = "repeat(auto-fit, minmax(250px, 1fr))";
		}
		
		var loading = document.getElementById("myo-loading");
		loading.style.display = "none";

		myogrid.innerHTML = html;

		async function loadFilteredTraitData() {
    			const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRclpELOsw7e_9hsNHgafNBOtAwe76GOxPDX5rvX243m7Q6W8hqOTsw7k8kIEvOZKJSQTVOsuXmwCyK/pub?gid=677812775&single=true&output=csv";

    			const csv = await fetchCSV(url);
    			const rows = parseCSV(csv);

    			const results = filterRows(
        			rows,
        			"Username",  username,
        			"Used", ""
    			);

    			console.log(results);
			return results;
		}

		const traits = await loadFilteredTraitData();
		
		html = "";
		

		for (let i = 0; i < traits.length; i++) { 
			const trait = traits[i]
			html += `<div class="trait"> 
			<img class="trait-image" src="${trait[2]}">
			<h4 class="trait-title">${trait[3]}</h4>
			<div class="trait-info">
				<p>From: ${trait[4]}</p>
				<p>Date: ${trait[5]}</p>
			</div>
			</div>
			
			`;
		}

		
		const traitgrid = document.getElementById("trait-grid");
		if(html == ""){
			html = `<div class="loading" style="width: 100%"> <h4 class="trait-title">No Unused Traits Found</h4></div>`;
			traitgrid.style.gridTemplateColumns = "repeat(auto-fit, minmax(250px, 1fr))";
		}
		
		loading = document.getElementById("trait-loading");
		loading.style.display = "none";
		

		traitgrid.innerHTML = html;



		async function loadFilteredVoucherData() {
    			const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRclpELOsw7e_9hsNHgafNBOtAwe76GOxPDX5rvX243m7Q6W8hqOTsw7k8kIEvOZKJSQTVOsuXmwCyK/pub?gid=1273044878&single=true&output=csv";

    			const csv = await fetchCSV(url);
    			const rows = parseCSV(csv);

    			const results = filterRows2(
        			rows,
        			"Username",  username,
        			"Remaining", "0"
    			);

    			console.log(results);
			return results;
		}

		const vouchers = await loadFilteredVoucherData();
		
		html = "";

		var total = 0;
		

		for (let i = 0; i < vouchers.length; i++) { 
			const voucher = vouchers[i]
			total += parseFloat(voucher[5], 10);
			html += `<div class="voucher"> 
			<img class="voucher-image" src="${voucher[2]}">
			<h4 class="voucher-title">$${voucher[3]} Redesign Voucher</h4>
			<div class="voucher-info">
				<p>Used: $${voucher[4]}</p>
				<p>Remaining: $${voucher[5]}</p>
				<p>From: ${voucher[6]}</p>
				<p>Date: ${voucher[7]}</p>
			</div>
			</div>
			
			`;
		}

		
		const vouchergrid = document.getElementById("voucher-grid");
		if(html == ""){
			html = `<div class="loading" style="width: 100%"> <h4 class="voucher-title">No Unused Vouchers Found</h4></div>`;
			vouchergrid.style.gridTemplateColumns = "repeat(auto-fit, minmax(250px, 1fr))";
		}
		
		loading = document.getElementById("voucher-loading");
		loading.style.display = "none";

		vouchergrid.innerHTML = html;

		const counter = document.getElementById("vouchers-header");
		
		counter.innerHTML = `<span class="arrow">▼</span><h2>Redesign Vouchers: $${total}</h2>`;




		async function loadFilteredPetpetData() {
    			const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0exCOdni2TTA43W-_V9LKJCEk5dGTS5vVOHlBGqY0T9f_3xoZNGtotrKCIqI7c6TPsghx-s3gLgqt/pub?gid=2084318873&single=true&output=csv";

    			const csv = await fetchCSV(url);
    			const rows = parseCSV(csv);

    			const results = filterRows(
        			rows,
        			"Username",  username,
        			"Used", ""
    			);

    			console.log(results);
			return results;
		}

		const petpets = await loadFilteredPetpetData();
		
		html = "";
		

		for (let i = 0; i < petpets.length; i++) { 
			const petpet = petpets[i];
			html += `<div class="petpet"> 
			<img class="petpet-image" src="${petpet[1]}">
			<h4 class="petpet-title">${petpet[2]}</h4>
			<div class="petpet-info">
				<p>From: ${petpet[3]}</p>
				<p>Date: ${petpet[4]}</p>
			</div>
			</div>
			
			`;
		}

		
		const petpetgrid = document.getElementById("petpet-grid");
		if(html == ""){
			html = `<div class="loading" style="width: 100%"> <h4 class="petpet-title">No Unused Petpet MYOs Found</h4></div>`;
			petpetgrid.style.gridTemplateColumns = "repeat(auto-fit, minmax(250px, 1fr))";
		}
		
		loading = document.getElementById("petpet-loading");
		loading.style.display = "none";
		

		petpetgrid.innerHTML = html;

	}
	main();
	
	</script>
</body>
</html>
